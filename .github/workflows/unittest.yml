name: Python CI

on:
push:
branches:
- main
pull_request:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  # Checkout repository
  - name: Checkout code
    uses: actions/checkout@v4

  # Set up Python
  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'
      cache: 'pip'

  # Install dependencies
  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  # Run tests
  - name: Run tests
    run: pytest
```
